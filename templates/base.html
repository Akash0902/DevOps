<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DevOps Learning Hub{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="nav">
    <div class="brand"><a href="{{ url_for('home') }}">⚙️ DevOps Hub</a></div>
    <nav>
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('topics_list') }}">Topics</a>
      <a href="{{ url_for('roadmap') }}">Roadmap</a>
      <a href="{{ url_for('quiz') }}">Quiz</a>
      <a href="{{ url_for('certifications') }}">Certifications</a>
      <a href="{{ url_for('home') }}">Contact Us</a>
    </nav>
  </header>
  <main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}<div class="flash {{ cat }}">{{ msg }}</div>{% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
  <footer><p>Built with Flask · DevOps Learning Hub</p></footer>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
